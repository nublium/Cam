<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="260" height="300" viewBox="0 0 260 300" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="hearth" cx="50%" cy="42%" r="75%">
      <stop offset="0%"  stop-color="#3a2a14"/>
      <stop offset="35%" stop-color="#1d1408"/>
      <stop offset="70%" stop-color="#0a0805"/>
      <stop offset="100%" stop-color="#040301"/>
    </radialGradient>
    <linearGradient id="goldStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#f5deaa"/>
      <stop offset="40%"  stop-color="#e8cc6e"/>
      <stop offset="75%"  stop-color="#c9a849"/>
      <stop offset="100%" stop-color="#8b7320"/>
    </linearGradient>
    <linearGradient id="goldFill" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#e8cc6e" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#8b7320" stop-opacity="0.20"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.6" result="blurred"/>
      <feMerge>
        <feMergeNode in="blurred"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="260" height="300" fill="url(#hearth)"/>

  <!-- ============ MAIN: heraldic lion silhouette ============ -->
  <g filter="url(#glow)">

    <!-- Mane outer rim (rough heraldic flame shape) -->
    <path d="M 130 50
             C 78 50, 50 80, 50 132
             C 50 148, 56 162, 66 174
             C 60 184, 60 198, 70 210
             C 78 222, 92 230, 108 234
             C 118 248, 142 248, 152 234
             C 168 230, 182 222, 190 210
             C 200 198, 200 184, 194 174
             C 204 162, 210 148, 210 132
             C 210 80, 182 50, 130 50 Z"
          fill="url(#goldFill)"
          stroke="url(#goldStroke)"
          stroke-width="2"
          stroke-linejoin="round"/>

    <!-- Mane inner spike rim (catches light) -->
    <path d="M 130 70
             C 95 70, 75 95, 75 134
             C 75 158, 84 178, 100 192
             C 110 206, 150 206, 160 192
             C 176 178, 185 158, 185 134
             C 185 95, 165 70, 130 70 Z"
          fill="none"
          stroke="url(#goldStroke)"
          stroke-width="0.8"
          stroke-linejoin="round"
          opacity="0.55"/>

    <!-- Mane outer spikes (jagged tufts around the head) -->
    <g stroke="url(#goldStroke)" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.85">
      <!-- top tufts -->
      <path d="M 110 56 L 105 38 L 116 52"/>
      <path d="M 130 50 L 130 30 L 140 50"/>
      <path d="M 150 56 L 156 38 L 145 52"/>
      <!-- side tufts L -->
      <path d="M 78 90 L 60 80 L 76 96"/>
      <path d="M 60 130 L 40 128 L 58 138"/>
      <path d="M 66 174 L 46 178 L 70 184"/>
      <!-- side tufts R -->
      <path d="M 182 90 L 200 80 L 184 96"/>
      <path d="M 200 130 L 220 128 L 202 138"/>
      <path d="M 194 174 L 214 178 L 190 184"/>
      <!-- bottom tufts -->
      <path d="M 92 226 L 82 240 L 100 232"/>
      <path d="M 168 226 L 178 240 L 160 232"/>
    </g>

    <!-- ============ FACE ============ -->
    <!-- Face oval -->
    <path d="M 130 110
             C 110 110, 100 122, 100 142
             C 100 168, 115 188, 130 196
             C 145 188, 160 168, 160 142
             C 160 122, 150 110, 130 110 Z"
          fill="rgba(40, 28, 12, 0.65)"
          stroke="url(#goldStroke)"
          stroke-width="1.5"/>

    <!-- Brow ridge -->
    <path d="M 110 132 Q 118 126, 124 132 M 136 132 Q 142 126, 150 132"
          stroke="url(#goldStroke)" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.8"/>

    <!-- Eyes -->
    <circle cx="118" cy="142" r="3.5" fill="#f5deaa"/>
    <circle cx="142" cy="142" r="3.5" fill="#f5deaa"/>
    <circle cx="118" cy="142" r="1.5" fill="#0a0805"/>
    <circle cx="142" cy="142" r="1.5" fill="#0a0805"/>

    <!-- Nose -->
    <path d="M 124 162 L 136 162 L 130 170 Z"
          fill="url(#goldStroke)" stroke="url(#goldStroke)" stroke-width="0.6"/>

    <!-- Snout / mouth -->
    <path d="M 130 170 L 130 180 M 122 180 Q 130 188, 138 180"
          stroke="url(#goldStroke)" stroke-width="1.2" fill="none" stroke-linecap="round"/>

    <!-- Whisker dots -->
    <g fill="url(#goldStroke)" opacity="0.6">
      <circle cx="116" cy="174" r="0.8"/>
      <circle cx="113" cy="178" r="0.8"/>
      <circle cx="144" cy="174" r="0.8"/>
      <circle cx="147" cy="178" r="0.8"/>
    </g>

    <!-- ============ THE SCAR (Kreta's defining mark) ============ -->
    <!-- Long diagonal eye-scar across the right side of the face -->
    <path d="M 152 122 L 158 168"
          stroke="#f5deaa" stroke-width="2.2"
          stroke-linecap="round" opacity="0.92"/>
    <!-- Cross-hatching on the scar (stitching look) -->
    <path d="M 154 132 L 150 134 M 155 144 L 159 142
             M 156 156 L 152 158"
          stroke="#f5deaa" stroke-width="1" stroke-linecap="round" opacity="0.78"/>

  </g>

  <!-- Subtle inner gold frame (emphasises the cathedral arch silhouette) -->
  <rect x="3" y="3" width="254" height="294" fill="none"
        stroke="url(#goldStroke)" stroke-width="0.5" opacity="0.30"/>

  <!-- Bottom signature -->
  <text x="130" y="278" font-family="Georgia, serif" font-size="13" font-style="italic"
        fill="rgba(232, 204, 110, 0.78)" text-anchor="middle" letter-spacing="4">KRETA</text>
  <text x="130" y="290" font-family="Georgia, serif" font-size="7"
        fill="rgba(201, 168, 73, 0.50)" text-anchor="middle" letter-spacing="4">THE SCARRED KING</text>
</svg>
