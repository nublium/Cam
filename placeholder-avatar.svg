<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="260" height="300" viewBox="0 0 260 300" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="hearth" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#2a1f0c"/>
      <stop offset="40%" stop-color="#15100600"/>
      <stop offset="70%" stop-color="#0a0805"/>
      <stop offset="100%" stop-color="#040301"/>
    </radialGradient>
    <linearGradient id="goldStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#f5deaa"/>
      <stop offset="40%" stop-color="#e8cc6e"/>
      <stop offset="70%" stop-color="#c9a849"/>
      <stop offset="100%" stop-color="#8b7320"/>
    </linearGradient>
    <linearGradient id="goldFill" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"  stop-color="#e8cc6e" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#8b7320" stop-opacity="0.20"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.4" result="blurred"/>
      <feMerge>
        <feMergeNode in="blurred"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Vellum-over-ash background -->
  <rect width="260" height="300" fill="url(#hearth)"/>

  <!-- Inner gothic frame line -->
  <rect x="6" y="6" width="248" height="288" fill="none"
        stroke="url(#goldStroke)" stroke-width="0.6" opacity="0.45"/>

  <!-- ============ TOP: pointed-arch ornament ============ -->
  <g stroke="url(#goldStroke)" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <!-- Pointed arch -->
    <path d="M 50 90 Q 50 30 130 30 Q 210 30 210 90"
          stroke-width="1.4" opacity="0.85"/>
    <!-- Inner arch (lighter) -->
    <path d="M 65 95 Q 65 48 130 48 Q 195 48 195 95"
          stroke-width="0.7" opacity="0.5"/>
    <!-- Apex finial -->
    <path d="M 130 16 L 130 32 M 124 22 L 136 22" stroke-width="1.4" opacity="0.85"/>
    <!-- Finial diamond -->
    <path d="M 130 36 L 134 40 L 130 44 L 126 40 Z" stroke-width="1" opacity="0.85"/>
  </g>

  <!-- ============ CROWN above the arch ============ -->
  <g fill="url(#goldFill)" stroke="url(#goldStroke)" stroke-width="1.0" filter="url(#glow)">
    <path d="M 100 20 L 105 8 L 115 16 L 125 4 L 135 4 L 145 16 L 155 8 L 160 20
             L 158 24 L 102 24 Z" opacity="0.85"/>
    <!-- Three small jewels on the crown -->
    <circle cx="115" cy="18" r="1.6" fill="#f5deaa" stroke="none"/>
    <circle cx="130" cy="14" r="1.8" fill="#f5deaa" stroke="none"/>
    <circle cx="145" cy="18" r="1.6" fill="#f5deaa" stroke="none"/>
  </g>

  <!-- ============ MAIN CRESS: lion silhouette w/ scar ============ -->
  <g filter="url(#glow)">
    <!-- Stylized lion-head silhouette (geometric heraldic style) -->
    <g fill="url(#goldFill)" stroke="url(#goldStroke)" stroke-width="1.3" stroke-linejoin="round" opacity="0.92">
      <!-- Mane outer -->
      <path d="M 130 100
               C 95 100, 80 115, 80 145
               C 80 170, 90 192, 110 200
               C 120 218, 140 218, 150 200
               C 170 192, 180 170, 180 145
               C 180 115, 165 100, 130 100 Z"/>
      <!-- Mane spikes -->
      <path d="M 90 120 L 85 108 L 96 116 M 110 105 L 112 92 L 119 106 M 130 100 L 130 88 L 138 102
               M 150 105 L 150 92 L 158 106 M 170 116 L 175 104 L 168 118
               M 80 145 L 70 144 L 80 152 M 180 145 L 190 144 L 180 152
               M 90 168 L 80 172 L 92 175 M 170 168 L 180 172 L 168 175"
            stroke-width="1.2" fill="none"/>
      <!-- Inner face -->
      <path d="M 110 145
               Q 110 132, 130 132
               Q 150 132, 150 145
               Q 150 165, 130 175
               Q 110 165, 110 145 Z"
            fill="rgba(40, 28, 12, 0.55)"/>
      <!-- Eyes -->
      <circle cx="120" cy="148" r="2.2" fill="#f5deaa" stroke="none"/>
      <circle cx="140" cy="148" r="2.2" fill="#f5deaa" stroke="none"/>
      <!-- Nose -->
      <path d="M 127 158 L 133 158 L 130 162 Z" fill="url(#goldStroke)" stroke="none"/>
      <!-- Mouth -->
      <path d="M 130 162 L 130 168 M 124 168 Q 130 172, 136 168" stroke-width="0.8"/>
    </g>

    <!-- The scar (eye scar — Kreta is the scarred king) -->
    <path d="M 145 138 L 152 158" stroke="#f5deaa" stroke-width="1.6"
          stroke-linecap="round" opacity="0.85"/>
    <path d="M 148 142 L 145 145 M 150 150 L 153 148"
          stroke="#f5deaa" stroke-width="0.9" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- ============ BOTTOM: crossed swords + scroll ============ -->
  <g stroke="url(#goldStroke)" fill="none" stroke-linecap="round" filter="url(#glow)">
    <!-- Sword 1 (left to right) -->
    <line x1="78" y1="248" x2="182" y2="220" stroke-width="1.4" opacity="0.75"/>
    <!-- Sword 2 (right to left) -->
    <line x1="78" y1="220" x2="182" y2="248" stroke-width="1.4" opacity="0.75"/>
    <!-- Hilts (small crosses at sword bases) -->
    <path d="M 75 218 L 81 224 M 75 224 L 81 218 M 75 246 L 81 252 M 75 252 L 81 246
             M 179 218 L 185 224 M 179 224 L 185 218 M 179 246 L 185 252 M 179 252 L 185 246"
          stroke-width="1.2" opacity="0.85"/>
    <!-- Center medallion at sword crossing -->
    <circle cx="130" cy="234" r="6" stroke-width="1" opacity="0.85" fill="rgba(15, 11, 6, 0.95)"/>
    <text x="130" y="238" font-family="Georgia, serif" font-size="9" font-style="italic"
          fill="#e8cc6e" text-anchor="middle" stroke="none">K</text>
  </g>

  <!-- ============ BOTTOM TEXT ============ -->
  <text x="130" y="278" font-family="Georgia, serif" font-size="11" font-style="italic"
        fill="rgba(232, 204, 110, 0.65)" text-anchor="middle" letter-spacing="3">KRETA</text>
  <text x="130" y="290" font-family="Georgia, serif" font-size="7"
        fill="rgba(201, 168, 73, 0.40)" text-anchor="middle" letter-spacing="4">THE SCARRED KING</text>
</svg>
